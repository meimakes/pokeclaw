app = "pokeclaw"
primary_region = "sjc"

[build]

[env]
  PORT = "8080"
  WORKSPACE_DIR = "/workspace"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "suspend"
  auto_start_machines = true
  min_machines_running = 0

[[http_service.checks]]
  grace_period = "10s"
  interval = "30s"
  method = "GET"
  path = "/health"
  timeout = "5s"

[mounts]
  source = "workspace"
  destination = "/workspace"
